<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Website Memo</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main class="container">
    <h1>網站工具箱</h1>

    <div class="mode-switch" role="tablist" aria-label="模式切換">
      <button id="modeMemo" class="active" type="button">Memo</button>
      <button id="modeBorder" type="button">Border</button>
    </div>

    <div id="popupStatus" class="status"></div>
    <section class="card">
      <div class="section-title">作用域</div>
      <div id="scopeTypeTabs" class="scope-tabs" role="tablist" aria-label="作用域切換">
        <button type="button" class="active" data-scope="domain">domain</button>
        <button type="button" data-scope="parent">父目錄</button>
        <button type="button" data-scope="page">單頁</button>
      </div>
      <div id="parentScopeGroup" class="parent-scope-group hidden">
        <label for="parentScopeInput">父目錄作用域（可編輯）</label>
        <input id="parentScopeInput" type="text" />
      </div>
      <div id="scopePreview" class="hint"></div>
    </section>

    <section id="memoPanel" class="card">
      <div class="section-title">Memo 設定</div>
      <label>內容</label>
      <textarea id="memoText" rows="4" placeholder="輸入 memo 內容"></textarea>
      <label>顏色</label>
      <input id="memoColor" type="color" value="#fff4a3" />
      <button id="addMemo" type="button">新增 Memo</button>
    </section>

    <section id="borderPanel" class="card hidden">
      <div class="section-title">Border 設定</div>
      <label>邊框顏色</label>
      <input id="borderColor" type="color" value="#ef4444" />
      <div id="borderColorPresets" class="color-presets" aria-label="快速顏色">
        <button type="button" class="color-swatch" data-color="#ef4444" style="--swatch-color:#ef4444" title="紅"></button>
        <button type="button" class="color-swatch" data-color="#f97316" style="--swatch-color:#f97316" title="橙"></button>
        <button type="button" class="color-swatch" data-color="#eab308" style="--swatch-color:#eab308" title="黃"></button>
        <button type="button" class="color-swatch" data-color="#22c55e" style="--swatch-color:#22c55e" title="綠"></button>
        <button type="button" class="color-swatch" data-color="#3b82f6" style="--swatch-color:#3b82f6" title="藍"></button>
        <button type="button" class="color-swatch" data-color="#4f46e5" style="--swatch-color:#4f46e5" title="靛"></button>
        <button type="button" class="color-swatch" data-color="#a855f7" style="--swatch-color:#a855f7" title="紫"></button>
      </div>
      <label>上方文字</label>
      <input id="labelTop" type="text" placeholder="上方說明（可空白）" />
      <label>右方文字</label>
      <input id="labelRight" type="text" placeholder="右方說明（可空白）" />
      <label>下方文字</label>
      <input id="labelBottom" type="text" placeholder="下方說明（可空白）" />
      <label>左方文字</label>
      <input id="labelLeft" type="text" placeholder="左方說明（可空白）" />
      <button id="addBorder" type="button">新增 Border</button>
    </section>

    <button id="openOptions" class="secondary" type="button">開啟完整設定視窗</button>
  </main>

  <script src="popup.js"></script>
</body>
</html>
